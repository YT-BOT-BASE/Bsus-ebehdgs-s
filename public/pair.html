<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS MINI LITE - PAIR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2rem;
        }

        input {
            width: 100%;
            padding: 1rem;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            margin: 1rem 0;
        }

        button {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            background: #ff6b6b;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
        }

        .code-box {
            background: white;
            color: #ff6b6b;
            font-size: 2.5rem;
            font-weight: bold;
            text-align: center;
            padding: 1.5rem;
            border-radius: 10px;
            margin: 1rem 0;
            letter-spacing: 5px;
        }

        .loader {
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid #ff6b6b;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        .error {
            color: #ff6b6b;
            text-align: center;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔗 PAIR DEVICE</h2>
        
        <input type="text" id="number" placeholder="94703229057" value="94703229057">
        
        <button onclick="getCode()">GET CODE</button>
        
        <div id="result" class="hidden">
            <div class="loader" id="loader"></div>
            <div id="codeDisplay"></div>
        </div>
    </div>

    <script>
        async function getCode() {
            const number = document.getElementById('number').value.replace(/[^0-9]/g, '');
            const resultDiv = document.getElementById('result');
            const loader = document.getElementById('loader');
            const codeDisplay = document.getElementById('codeDisplay');
            
            resultDiv.classList.remove('hidden');
            loader.classList.remove('hidden');
            codeDisplay.innerHTML = '';
            
            try {
                const response = await fetch(`/code?number=${number}`);
                const data = await response.json();
                
                loader.classList.add('hidden');
                
                if (data.success && data.code) {
                    codeDisplay.innerHTML = `
                        <div class="code-box">${data.code}</div>
                        <p style="text-align:center">✅ Enter code in WhatsApp</p>
                    `;
                } else if (data.status === 'connected') {
                    codeDisplay.innerHTML = '<p style="color:#4ecdc4">✅ Already Connected!</p>';
                } else {
                    codeDisplay.innerHTML = `<p class="error">❌ ${data.error || 'Failed'}</p>`;
                }
            } catch (error) {
                loader.classList.add('hidden');
                codeDisplay.innerHTML = '<p class="error">❌ Connection failed</p>';
            }
        }
    </script>
</body>
</html>
